<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Freedom Day Countdown</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-1: #07090f;
    --bg-2: #11151f;
    --gold: #d4af37;
    --gold-soft: #e8c87a;
    --gold-dim: #8a7330;
    --text: #f5ecd0;
    --text-dim: #9a8f73;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: radial-gradient(ellipse at center, var(--bg-2) 0%, var(--bg-1) 70%);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  #fireworks {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 5;
    display: none;
  }

  .stage {
    position: relative;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.5rem;
    text-align: center;
    z-index: 1;
  }

  .ornament {
    color: var(--gold);
    letter-spacing: 0.6em;
    font-size: 0.75rem;
    margin-bottom: 1.5rem;
    text-transform: uppercase;
    opacity: 0.85;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-style: italic;
    font-size: clamp(2.2rem, 6vw, 4.5rem);
    color: var(--gold-soft);
    line-height: 1.1;
    margin-bottom: 0.4rem;
    letter-spacing: 0.02em;
  }

  .subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1rem, 1.8vw, 1.3rem);
    color: var(--text-dim);
    margin: 0 auto 3rem;
    max-width: 620px;
    line-height: 1.5;
    text-align: center;
  }

  .divider {
    width: 120px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
    margin: 0 auto 3rem;
  }

  .countdown {
    display: flex;
    gap: clamp(1rem, 3vw, 3rem);
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 2.5rem;
  }

  .unit {
    min-width: 90px;
  }

  .num {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(3rem, 8vw, 6rem);
    color: var(--text);
    line-height: 1;
    font-variant-numeric: tabular-nums;
    text-shadow: 0 0 30px rgba(212, 175, 55, 0.15);
  }

  .label {
    margin-top: 0.6rem;
    font-size: 0.7rem;
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.75;
  }

  .target-date {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: var(--text-dim);
    font-size: clamp(0.95rem, 1.5vw, 1.1rem);
    margin-top: 1rem;
    letter-spacing: 0.05em;
  }

  .celebration {
    display: none;
    flex-direction: column;
    align-items: center;
    text-align: center;
    animation: fadeUp 1.4s ease forwards;
  }

  .celebration h1 {
    font-size: clamp(3rem, 9vw, 6.5rem);
    color: var(--gold);
    font-style: italic;
    margin-bottom: 1rem;
    text-shadow: 0 0 40px rgba(212, 175, 55, 0.5);
  }

  .celebration .subtitle {
    color: var(--gold-soft);
    font-size: clamp(1.2rem, 2.5vw, 1.8rem);
    font-style: italic;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .corner {
    position: fixed;
    color: var(--gold-dim);
    font-size: 2rem;
    font-family: 'Cormorant Garamond', serif;
    opacity: 0.5;
    pointer-events: none;
  }
  .corner.tl { top: 1.2rem; left: 1.5rem; }
  .corner.tr { top: 1.2rem; right: 1.5rem; }
  .corner.bl { bottom: 1.2rem; left: 1.5rem; }
  .corner.br { bottom: 1.2rem; right: 1.5rem; }

  @media (max-width: 480px) {
    .unit { min-width: 70px; }
    .countdown { gap: 0.8rem; }
    .corner { font-size: 1.4rem; }
  }
</style>
</head>
<body>

<canvas id="fireworks"></canvas>

<span class="corner tl">&#10086;</span>
<span class="corner tr">&#10086;</span>
<span class="corner bl">&#10086;</span>
<span class="corner br">&#10086;</span>

<main class="stage" id="stage">
  <div id="countdownView" style="width: 100%; max-width: 900px;">
    <div class="ornament">&#10047; &nbsp; The Long Awaited &nbsp; &#10047;</div>
    <h1>Freedom Day Countdown</h1>
    <p class="subtitle">The reign of the old regime draws to a close. A new era of property management approaches.</p>
    <div class="divider"></div>

    <div class="countdown" id="countdown">
      <div class="unit"><div class="num" id="days">--</div><div class="label">Days</div></div>
      <div class="unit"><div class="num" id="hours">--</div><div class="label">Hours</div></div>
      <div class="unit"><div class="num" id="minutes">--</div><div class="label">Minutes</div></div>
      <div class="unit"><div class="num" id="seconds">--</div><div class="label">Seconds</div></div>
    </div>

    <div class="target-date">until <span id="targetLabel">August 1st</span></div>
  </div>

  <div class="celebration" id="celebrationView">
    <div class="ornament">&#10047; &nbsp; At Last &nbsp; &#10047;</div>
    <h1>Freedom Day</h1>
    <p class="subtitle">The day has come. Pop the champagne.</p>
  </div>
</main>

<script>
  // Target: August 1st at midnight local time. Year auto-rolls if past.
  function getTarget() {
    const now = new Date();
    let year = now.getFullYear();
    let t = new Date(year, 7, 1, 0, 0, 0, 0); // month 7 = August
    if (t.getTime() <= now.getTime()) {
      t = new Date(year + 1, 7, 1, 0, 0, 0, 0);
    }
    return t;
  }

  const target = getTarget();
  document.getElementById('targetLabel').textContent =
    target.toLocaleDateString(undefined, { month: 'long', day: 'numeric', year: 'numeric' });

  const els = {
    days: document.getElementById('days'),
    hours: document.getElementById('hours'),
    minutes: document.getElementById('minutes'),
    seconds: document.getElementById('seconds'),
    countdownView: document.getElementById('countdownView'),
    celebrationView: document.getElementById('celebrationView'),
  };

  let celebrating = false;
  function pad(n) { return String(n).padStart(2, '0'); }

  function tick() {
    const now = Date.now();
    const diff = target.getTime() - now;

    if (diff <= 0) {
      if (!celebrating) startCelebration();
      return;
    }

    const s = Math.floor(diff / 1000);
    const days = Math.floor(s / 86400);
    const hours = Math.floor((s % 86400) / 3600);
    const minutes = Math.floor((s % 3600) / 60);
    const seconds = s % 60;

    els.days.textContent = pad(days);
    els.hours.textContent = pad(hours);
    els.minutes.textContent = pad(minutes);
    els.seconds.textContent = pad(seconds);
  }

  tick();
  setInterval(tick, 1000);

  // ---------- Fireworks ----------
  const canvas = document.getElementById('fireworks');
  const ctx = canvas.getContext('2d');
  let particles = [];
  let rockets = [];
  let fwRunning = false;

  function sizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', sizeCanvas);
  sizeCanvas();

  const palette = [
    [255, 215, 120], // warm gold
    [255, 240, 200], // cream
    [212, 175, 55],  // rich gold
    [255, 180, 90],  // amber
    [255, 255, 230], // bright
  ];
  function pickColor() { return palette[Math.floor(Math.random() * palette.length)]; }

  class Rocket {
    constructor() {
      this.x = Math.random() * canvas.width;
      this.y = canvas.height + 10;
      this.targetY = canvas.height * (0.2 + Math.random() * 0.35);
      this.vy = -(8 + Math.random() * 3);
      this.color = pickColor();
      this.dead = false;
    }
    update() {
      this.y += this.vy;
      this.vy += 0.08;
      if (this.y <= this.targetY || this.vy >= 0) {
        this.explode();
        this.dead = true;
      }
    }
    draw() {
      ctx.beginPath();
      ctx.fillStyle = `rgba(${this.color[0]},${this.color[1]},${this.color[2]},0.9)`;
      ctx.arc(this.x, this.y, 2.5, 0, Math.PI * 2);
      ctx.fill();
    }
    explode() {
      const count = 80 + Math.floor(Math.random() * 60);
      const color = this.color;
      for (let i = 0; i < count; i++) {
        const angle = (Math.PI * 2 * i) / count + Math.random() * 0.05;
        const speed = 2 + Math.random() * 4;
        particles.push(new Particle(this.x, this.y, Math.cos(angle) * speed, Math.sin(angle) * speed, color));
      }
    }
  }

  class Particle {
    constructor(x, y, vx, vy, color) {
      this.x = x; this.y = y;
      this.vx = vx; this.vy = vy;
      this.life = 1;
      this.decay = 0.012 + Math.random() * 0.015;
      this.color = color;
      this.size = 2 + Math.random() * 1.5;
    }
    update() {
      this.x += this.vx;
      this.y += this.vy;
      this.vx *= 0.98;
      this.vy *= 0.98;
      this.vy += 0.04; // gravity
      this.life -= this.decay;
    }
    draw() {
      if (this.life <= 0) return;
      const [r, g, b] = this.color;
      ctx.beginPath();
      ctx.fillStyle = `rgba(${r},${g},${b},${this.life})`;
      ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  let launchTimer = 0;
  function animate() {
    if (!fwRunning) return;
    // soft trail fade
    ctx.fillStyle = 'rgba(7, 9, 15, 0.18)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    launchTimer--;
    if (launchTimer <= 0) {
      const burstCount = 1 + Math.floor(Math.random() * 2);
      for (let i = 0; i < burstCount; i++) rockets.push(new Rocket());
      launchTimer = 25 + Math.floor(Math.random() * 40);
    }

    rockets.forEach(r => { r.update(); r.draw(); });
    rockets = rockets.filter(r => !r.dead);

    particles.forEach(p => { p.update(); p.draw(); });
    particles = particles.filter(p => p.life > 0);

    requestAnimationFrame(animate);
  }

  function startCelebration() {
    celebrating = true;
    els.countdownView.style.display = 'none';
    els.celebrationView.style.display = 'flex';
    canvas.style.display = 'block';
    fwRunning = true;
    animate();
  }

  // Dev helper: append ?celebrate to URL to preview the fireworks.
  if (window.location.search.includes('celebrate')) {
    startCelebration();
  }
</script>
</body>
</html>
